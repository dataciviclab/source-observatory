name: catalog-inventory

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog-inventory:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CATALOG_INVENTORY_GCS_PREFIX: ${{ secrets.CATALOG_INVENTORY_GCS_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build catalog inventory
        run: |
          python scripts/build_catalog_inventory.py --out-dir data/catalog_inventory/generated

      - name: Publish summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("data/catalog_inventory/generated/catalog_inventory_report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))

          lines = ["## Catalog inventory", ""]

          sources = report.get("sources", {})
          error_count = sum(1 for info in sources.values() if info.get("status") == "error")
          ok_count = sum(1 for info in sources.values() if info.get("status") == "ok")
          total_count = len(sources)

          if error_count > 0:
              lines.append(f"> [!WARNING]\n> {error_count}/{total_count} source hanno riportato errori nel report.")
              lines.append("")

          lines.append(f"- Fonti inventariate: {ok_count}/{total_count}")
          lines.append("")

          for source_id, info in sources.items():
              status = info.get("status")
              if status == "ok":
                  lines.append(f"- `{source_id}`: ok ({info.get('rows')} item)")
              elif status == "non_inventariabile":
                  lines.append(f"- `{source_id}`: non inventariabile")
              elif status == "protocol_not_supported":
                  lines.append(f"- `{source_id}`: protocollo non supportato (`{info.get('protocol', 'n/d')}`)")
              else:
                  lines.append(f"- `{source_id}`: errore (`{info.get('error', 'n/d')}`)")

          Path("summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog-inventory
          path: |
            data/catalog_inventory/generated/catalog_inventory_latest.parquet
            data/catalog_inventory/generated/catalog_inventory_report.json

      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' && env.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' && env.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload snapshot to GCS
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' && env.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        run: |
          stamp=$(python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("data/catalog_inventory/generated/catalog_inventory_report.json").read_text(encoding="utf-8"))
          print(report["captured_at"].replace(":", "").replace("-", ""))
          PY
          )
          prefix='${{ env.CATALOG_INVENTORY_GCS_PREFIX }}'
          prefix="${prefix%/}"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_latest.parquet "$prefix/catalog_inventory_latest.parquet"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_report.json "$prefix/catalog_inventory_report.json"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_latest.parquet "$prefix/snapshots/catalog_inventory_${stamp}.parquet"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_report.json "$prefix/snapshots/catalog_inventory_report_${stamp}.json"
