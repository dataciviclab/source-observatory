name: resource-monitor

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resource-monitor-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run resource monitor (smoke)
        env:
          SMOKE_ROOT: ${{ runner.temp }}/resource-monitor-smoke
        run: |
          mkdir -p "$SMOKE_ROOT/scripts"
          cp scripts/resource_monitor.py "$SMOKE_ROOT/scripts/"
          cp scripts/resource_monitor.sources.yml "$SMOKE_ROOT/scripts/"
          mkdir -p "$SMOKE_ROOT/data/monitor/snapshots" "$SMOKE_ROOT/data/monitor/reports"

          python "$SMOKE_ROOT/scripts/resource_monitor.py" \
            --sources "$SMOKE_ROOT/scripts/resource_monitor.sources.yml" \
            --timeout 20

      - name: Verify checkout remains clean
        run: |
          git diff --quiet --exit-code

      - name: Publish summary
        env:
          SMOKE_ROOT: ${{ runner.temp }}/resource-monitor-smoke
        run: |
          report="$SMOKE_ROOT/data/monitor/reports/latest.md"
          diff_json="$SMOKE_ROOT/data/monitor/reports/diff_summary.json"
          snapshot_count=$(ls -1 "$SMOKE_ROOT/data/monitor/snapshots"/*.json 2>/dev/null | wc -l)

          {
            echo "## Resource monitor smoke"
            echo
            echo "- Snapshot generati: ${snapshot_count}"
            echo "- Report: ${report}"
            echo "- Diff summary: ${diff_json}"
            echo
            if [[ -f "$report" ]]; then
              echo "### Anteprima report"
              echo
              head -n 40 "$report"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: resource-monitor-smoke
          path: |
            ${{ runner.temp }}/resource-monitor-smoke/data/monitor/reports/latest.md
            ${{ runner.temp }}/resource-monitor-smoke/data/monitor/reports/diff_summary.json
            ${{ runner.temp }}/resource-monitor-smoke/data/monitor/snapshots/*.json
          if-no-files-found: error
