name: catalog-inventory-manual

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  catalog-inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML duckdb pandas

      - name: Build catalog inventory
        run: |
          python scripts/build_catalog_inventory.py --out-dir data/catalog_inventory/generated

      - name: Publish summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("data/catalog_inventory/generated/catalog_inventory_report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))

          lines = ["## Catalog inventory", ""]
          for source_id, info in report.get("sources", {}).items():
              status = info.get("status")
              if status == "ok":
                  lines.append(f"- `{source_id}`: ok ({info.get('rows')} item)")
              elif status == "non_inventariabile":
                  lines.append(f"- `{source_id}`: non inventariabile")
              else:
                  lines.append(f"- `{source_id}`: errore (`{info.get('error', 'n/d')}`)")

          Path("summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog-inventory
          path: |
            data/catalog_inventory/generated/catalog_inventory_latest.parquet
            data/catalog_inventory/generated/catalog_inventory_report.json

      - name: Authenticate to Google Cloud
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' && secrets.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' && secrets.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload snapshot to GCS
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' && secrets.CATALOG_INVENTORY_GCS_PREFIX != '' }}
        run: |
          stamp=$(python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("data/catalog_inventory/generated/catalog_inventory_report.json").read_text(encoding="utf-8"))
          print(report["captured_at"].replace(":", "").replace("-", ""))
          PY
          )
          prefix='${{ secrets.CATALOG_INVENTORY_GCS_PREFIX }}'
          prefix="${prefix%/}"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_latest.parquet "$prefix/catalog_inventory_latest.parquet"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_report.json "$prefix/catalog_inventory_report.json"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_latest.parquet "$prefix/snapshots/catalog_inventory_${stamp}.parquet"
          gcloud storage cp data/catalog_inventory/generated/catalog_inventory_report.json "$prefix/snapshots/catalog_inventory_report_${stamp}.json"
